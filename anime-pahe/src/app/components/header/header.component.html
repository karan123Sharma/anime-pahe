<header [class.scrolled]="scrolled()">
  <div class="header-inner">
    <div class="header-left">
      <a routerLink="/" class="logo">
        <span class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
            <path d="M5 3l14 9-14 9V3z" fill="url(#logo-grad)"/>
            <defs><linearGradient id="logo-grad" x1="5" y1="3" x2="19" y2="12">
              <stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#06b6d4"/>
            </linearGradient></defs>
          </svg>
        </span>
        <span class="logo-text">Anime<span class="logo-accent">Pahe</span></span>
      </a>

      <nav class="nav-links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        <a routerLink="/browse" routerLinkActive="active">Browse</a>
        <a routerLink="/watchlist" routerLinkActive="active">Watchlist</a>
      </nav>
    </div>

    <div class="header-center">
      <div class="search-wrapper">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="text"
          placeholder="Search anime..."
          [(ngModel)]="searchQuery"
          (keyup.enter)="onSearch()"
        />
      </div>
    </div>

    <div class="header-right">
      <a routerLink="/profile" class="avatar-btn" title="Profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/>
        </svg>
      </a>
      <button class="mobile-toggle" (click)="toggleMobile()" aria-label="Toggle menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          @if (mobileMenuOpen()) {
            <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
          } @else {
            <path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/>
          }
        </svg>
      </button>
    </div>
  </div>

  @if (mobileMenuOpen()) {
    <div class="mobile-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="toggleMobile()">Home</a>
      <a routerLink="/browse" routerLinkActive="active" (click)="toggleMobile()">Browse</a>
      <a routerLink="/watchlist" routerLinkActive="active" (click)="toggleMobile()">Watchlist</a>
      <a routerLink="/profile" routerLinkActive="active" (click)="toggleMobile()">Profile</a>
    </div>
  }
</header>
